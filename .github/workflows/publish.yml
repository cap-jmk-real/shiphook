# Runs only after CI succeeds on a *push* to main (merge). Not on PR updates.
name: Publish to npm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org/"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "ERROR: secrets.NPM_TOKEN is not set."
            exit 1
          fi
          npm whoami --registry https://registry.npmjs.org/

      - name: Publish
        run: npm publish --access public --registry https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Read package version
        id: pkg
        run: |
          node -e "const fs = require('fs'); const v = require('./package.json').version; fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${v}\n`);"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          release_name: shiphook v${{ steps.pkg.outputs.version }}
          draft: false
          prerelease: false
